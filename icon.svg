<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="60%" stop-color="#0d1225"/>
      <stop offset="100%" stop-color="#080b14"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d48a"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6510"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0a0f0"/>
      <stop offset="100%" stop-color="#9c72e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 角丸の背景（maskable safe area考慮） -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 星空 -->
  <circle cx="80"  cy="100" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="430" cy="80"  r="2"   fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="180" r="1.8" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="160" r="2"   fill="#fff" opacity="0.6"/>
  <circle cx="60"  cy="380" r="2"   fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="430" r="2.2" fill="#fff" opacity="0.5"/>

  <!-- 外側の輪（女神の円光） -->
  <circle cx="256" cy="256" r="180" fill="none"
          stroke="url(#purple)" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="200" fill="none"
          stroke="url(#gold)" stroke-width="2" opacity="0.55"/>

  <!-- 中央の四芒星（✦） -->
  <g filter="url(#glow)" transform="translate(256 256)">
    <path d="M 0 -130 L 18 -18 L 130 0 L 18 18 L 0 130 L -18 18 L -130 0 L -18 -18 Z"
          fill="url(#gold)"/>
    <path d="M 0 -65 L 9 -9 L 65 0 L 9 9 L 0 65 L -9 9 L -65 0 L -9 -9 Z"
          fill="#fff7d8" opacity="0.85"/>
  </g>

  <!-- 下部のラベル（V = ヴィタリア） -->
  <text x="256" y="455" text-anchor="middle"
        font-family="Noto Serif JP, serif" font-weight="900"
        font-size="48" fill="url(#gold)" letter-spacing="6">VITALIA</text>
</svg>
