<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ショップ ｜ ヴィタリア転生録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--gold:#c9a84c;--gold2:#f0d48a;--silver:#aabcd8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(ellipse at 50% 0%,#1a1430 0%,#080b14 60%);color:var(--silver);min-height:100vh;overflow-x:hidden;}
header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header a{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:900;color:var(--gold2);text-decoration:none;}
.back-btn{background:none;border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.7);font-size:.72rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;text-decoration:none;}

.page{max-width:680px;margin:0 auto;padding:20px 18px 60px;}
.intro{text-align:center;margin-bottom:18px;}
.intro h1{font-family:'Noto Serif JP',serif;font-size:1.5rem;color:var(--gold2);margin-bottom:6px;}

.coin-card{
  background:linear-gradient(135deg,rgba(240,212,138,.15),rgba(201,168,76,.06));
  border:1.5px solid rgba(240,212,138,.45);border-radius:14px;
  padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;
}
.coin-info{font-size:.7rem;color:rgba(240,212,138,.75);}
.coin-num{font-family:'Noto Serif JP',serif;font-size:1.6rem;font-weight:900;color:#f0d48a;line-height:1;}
.coin-meta{font-size:.55rem;color:rgba(170,188,216,.55);margin-top:2px;}

.shop-list{display:flex;flex-direction:column;gap:10px;}
.shop-item{
  background:linear-gradient(160deg,rgba(20,16,40,.85),rgba(8,6,20,.95));
  border:1.5px solid rgba(201,168,76,.25);border-radius:12px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;
}
.si-icon{font-size:2rem;line-height:1;flex-shrink:0;width:48px;text-align:center;filter:drop-shadow(0 0 10px rgba(240,212,138,.4));}
.si-info{flex:1;min-width:0;}
.si-name{font-family:'Noto Serif JP',serif;font-size:.95rem;font-weight:900;color:#e8e4d4;line-height:1.3;}
.si-desc{font-size:.72rem;color:rgba(220,225,245,.7);margin-top:3px;line-height:1.5;}
.si-cost{font-size:.7rem;color:#f0d48a;margin-top:5px;font-weight:700;}
.si-buy{
  background:linear-gradient(135deg,#c9a84c,#f0d48a);border:none;color:#1a1200;
  font-family:'Noto Serif JP',serif;font-size:.78rem;font-weight:900;padding:8px 14px;border-radius:9px;cursor:pointer;
  flex-shrink:0;
}
.si-buy:disabled{opacity:.4;cursor:not-allowed;}

.foot-note{font-size:.65rem;color:rgba(170,188,216,.5);text-align:center;margin-top:18px;line-height:1.7;}
</style>
<script src="./app-safety.js"></script>
<script src="./gamification.js"></script>
</head>
<body>
<header>
  <a href="./game.html">⟵ ヴィタリア転生録</a>
  <a href="./collection.html" class="back-btn">コレクション</a>
</header>

<main class="page">
  <div class="intro">
    <h1>🛒 ヴィタリア商店</h1>
    <p style="font-size:.78rem;color:rgba(220,225,245,.7);">累積XPで強化アイテムを購入できます。</p>
  </div>

  <div class="coin-card">
    <div>
      <div class="coin-info">所持コイン</div>
      <div class="coin-num"><span id="coin-num">0</span> 🪙</div>
      <div class="coin-meta">10 XP = 1コイン換算（累積XPの1/10）</div>
    </div>
  </div>

  <div class="shop-list" id="shop-list"></div>

  <div class="foot-note">
    使用したアイテムは即座に効果発動します。<br>
    <span style="color:rgba(240,180,80,.7);">⚠ コインの増加には記録の継続が必要です</span>
  </div>
</main>

<script>
function render(){
  if(!window.Gamification){
    setTimeout(render, 200);
    return;
  }
  const coins = window.Gamification.getCoins();
  document.getElementById('coin-num').textContent = coins;
  const list = document.getElementById('shop-list');
  list.innerHTML = window.Gamification.SHOP_ITEMS.map(item=>`
    <div class="shop-item">
      <div class="si-icon">${item.icon}</div>
      <div class="si-info">
        <div class="si-name">${item.name}</div>
        <div class="si-desc">${item.desc}</div>
        <div class="si-cost">${item.cost} 🪙</div>
      </div>
      <button class="si-buy" data-id="${item.id}" ${coins<item.cost?'disabled':''}>購入</button>
    </div>
  `).join('');
  document.querySelectorAll('.si-buy').forEach(b=>{
    b.addEventListener('click', ()=>{
      const id = b.dataset.id;
      if(!confirm('購入してアイテムを使用します。よろしいですか？')) return;
      const r = window.Gamification.buyShopItem(id);
      if(r.ok){
        alert('✓ ' + r.msg);
        try{ if(window.AppEnhance?.confetti) window.AppEnhance.confetti({count:40,colors:['#f0d48a','#fff8d8']}); }catch(e){}
        try{ if(navigator.vibrate) navigator.vibrate([20,50,20]); }catch(e){}
        render();
      } else {
        alert('⚠ ' + r.msg);
      }
    });
  });
}
render();
</script>
</body>
</html>
