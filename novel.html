<script>
const body = document.body;
document.querySelectorAll('.mode-tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.mode-tab').forEach(x=>x.classList.remove('active','villainess-active'));
    t.classList.add('active');
    const mode = t.dataset.mode;
    body.classList.remove('mode-vitalia','mode-villainess');
    body.classList.add('mode-'+mode);
    if(mode === 'villainess') t.classList.add('villainess-active');
    try{ localStorage.setItem('vt_novel_mode', mode); }catch(e){}
  });
});
try{
  const saved = localStorage.getItem('vt_novel_mode');
  if(saved === 'villainess') document.querySelector('.mode-tab[data-mode="villainess"]')?.click();
}catch(e){}
const stb = document.getElementById('scroll-top');
window.addEventListener('scroll', ()=>{
  if(window.scrollY > 600) stb.classList.add('show');
  else stb.classList.remove('show');
});
stb.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.style.animationPlayState = 'running';
  });
}, { threshold: 0.1 });
document.querySelectorAll('.chapter').forEach(c=>{
  c.style.animationPlayState = 'paused';
  observer.observe(c);
});
</script>
