<style>
:root{--bg:#080b14;--bg2:#0e1220;--gold:#c9a84c;--gold2:#f0d48a;--silver:#aabcd8;--green:#4ec98a;--red:#e05c5c;--purple:#9c72e0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--silver);min-height:100vh;overflow-x:hidden;padding-bottom:60px;}
.bottom-nav{ background:rgba(248,252,255,.98) !important; border-top:1px solid rgba(30,127,164,.15) !important; }
.bn-tab{ color:rgba(53,87,115,.45) !important; -webkit-text-fill-color:rgba(53,87,115,.45) !important; }
.bn-tab.active{ color:#1e7fa4 !important; -webkit-text-fill-color:#1e7fa4 !important; }
.bn-tab .bn-icon{ filter:none !important; -webkit-text-fill-color:initial !important; color:initial !important; }
body{ padding-bottom:calc(80px + env(safe-area-inset-bottom,0)) !important; }
.bn-icon{font-size:1.55rem;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.bn-tab.active .bn-icon{transform:scale(1.18) translateY(-2px);}
.bn-label{font-size:.62rem;font-weight:900;letter-spacing:.03em;line-height:1;}

header{background:rgba(10,14,24,.95);border-bottom:1px solid rgba(201,168,76,.15);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
header a.brand{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:900;color:var(--gold2);text-decoration:none;}
.back-btn{background:none;border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.7);font-size:.72rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;text-decoration:none;}

.page{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
.title-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Noto Serif JP',serif;font-size:1.4rem;font-weight:900;color:var(--gold2);}
.page-sub{font-size:.7rem;color:rgba(170,188,216,.55);margin-top:4px;}
.summary-stats{display:flex;gap:8px;font-size:.65rem;}
.summary-stat{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.22);border-radius:8px;padding:5px 11px;}
.summary-stat strong{color:var(--gold2);font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:900;}

.map-track{
  position:relative;background:linear-gradient(180deg,rgba(20,16,40,.5),rgba(8,6,16,.7));
  border:1px solid rgba(201,168,76,.18);border-radius:18px;padding:14px;
}
.map-trail{
  position:absolute;left:50%;top:36px;bottom:36px;width:3px;
  background:linear-gradient(180deg,
    rgba(201,168,76,.55) 0%,
    rgba(78,201,138,.45) 25%,
    rgba(156,114,224,.45) 50%,
    rgba(224,140,80,.45) 75%,
    rgba(240,212,138,.6) 100%);
  transform:translateX(-50%);border-radius:99px;
  z-index:0;
}
.chapter-row{
  display:grid;grid-template-columns:1fr 80px 1fr;gap:10px;align-items:center;
  position:relative;padding:18px 0;z-index:1;
}
.chapter-row.flip{grid-template-columns:1fr 80px 1fr;}
.chapter-row.flip .chapter-card{order:3;}
.chapter-row.flip .chapter-token{order:2;}
.chapter-row.flip .chapter-spacer{order:1;}
.chapter-spacer{}
.chapter-token{
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,0,0,.6);border:2.5px solid rgba(201,168,76,.35);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  position:relative;flex-shrink:0;justify-self:center;
  transition:transform .25s, border-color .25s;
}
.chapter-token img{width:90%;height:90%;object-fit:contain;}
.chapter-row.cleared .chapter-token{
  border-color:rgba(78,201,138,.7);box-shadow:0 0 24px rgba(78,201,138,.3);
}
.chapter-row.current .chapter-token{
  border-color:var(--gold2);box-shadow:0 0 28px rgba(240,212,138,.5);
  animation:tokenPulse 2.4s ease-in-out infinite;
}
@keyframes tokenPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.chapter-row.locked .chapter-token{
  filter:grayscale(.9) brightness(.4);border-color:rgba(170,188,216,.2);
}
.chapter-row.locked .chapter-token::after{
  content:'白';position:absolute;font-size:1.2rem;
  background:rgba(0,0,0,.7);border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
}
.chapter-card{
  background:rgba(14,18,32,.85);border:1px solid rgba(201,168,76,.15);
  border-radius:12px;padding:10px 13px;text-decoration:none;color:inherit;
  transition:all .2s;display:block;
}
.chapter-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-1px);}
.chapter-row.locked .chapter-card{opacity:.45;pointer-events:none;}
.chapter-row.cleared .chapter-card{border-color:rgba(78,201,138,.3);background:rgba(78,201,138,.04);}
.chapter-row.current .chapter-card{border-color:rgba(240,212,138,.5);background:rgba(240,212,138,.06);box-shadow:0 0 16px rgba(240,212,138,.1);}
.cc-stage{font-size:.55rem;letter-spacing:.14em;color:rgba(201,168,76,.55);font-weight:700;text-transform:uppercase;}
.cc-name{font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:900;color:#f0e4d4;line-height:1.3;margin:3px 0;}
.chapter-row.cleared .cc-name{color:#a8e8c0;}
.chapter-row.current .cc-name{color:var(--gold2);}
.cc-hp{font-size:.62rem;color:rgba(170,188,216,.55);}
.cc-hp-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;margin-top:4px;overflow:hidden;}
.cc-hp-fill{height:100%;background:linear-gradient(90deg,#e05c5c,#f0a0a0);border-radius:99px;transition:width .5s;}
.chapter-row.cleared .cc-hp-fill{background:linear-gradient(90deg,#4ec98a,#a8e8c0);}
.cc-status{font-size:.55rem;font-weight:700;letter-spacing:.06em;margin-top:4px;}
.chapter-row.cleared .cc-status{color:#a8e8c0;}
.chapter-row.current .cc-status{color:var(--gold2);}
.chapter-row.locked .cc-status{color:rgba(170,188,216,.45);}

.theme-divider{
  text-align:center;font-size:.62rem;letter-spacing:.18em;font-weight:700;
  color:rgba(170,188,216,.4);margin:20px 0 12px;text-transform:uppercase;
  position:relative;z-index:1;
}
.theme-divider::before, .theme-divider::after{
  content:'';display:inline-block;width:60px;height:1px;
  background:rgba(170,188,216,.18);vertical-align:middle;margin:0 12px;
}

.cta-bottom{
  background:linear-gradient(135deg,rgba(156,114,224,.18),rgba(78,201,138,.1));
  border:1px solid rgba(156,114,224,.3);border-radius:14px;
  padding:18px 16px;text-align:center;margin-top:24px;
  text-decoration:none;color:inherit;display:block;
}
.cta-bottom:hover{transform:translateY(-2px);}
.cta-bottom-title{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:900;color:#e8d4ff;margin-bottom:4px;}
.cta-bottom-sub{font-size:.7rem;color:rgba(220,225,245,.65);}

@media(max-width:520px){
  .chapter-row{grid-template-columns:1fr 64px 1fr;padding:14px 0;gap:7px;}
  .chapter-token{width:64px;height:64px;}
  .map-trail{left:50%;}
  .cc-name{font-size:.78rem;}
  .cc-stage{font-size:.5rem;}
  .cc-hp{font-size:.58rem;}
}
</style>

const uid = localStorage.getItem('vitalia_uid_hint') || '';
const list = document.getElementById('chapter-list');

function loadState(){
  if(!uid) return { chapterIdx:0, defeated:[] };
  try{ return JSON.parse(localStorage.getItem(`va_state_${uid}`) || '{"chapterIdx":0,"defeated":[]}'); }catch(e){ return { chapterIdx:0, defeated:[] }; }
}
function getDmg(id){
  if(!uid) return 0;
  return parseInt(localStorage.getItem(`va_dmg_${uid}_${id}`) || '0', 10);
}

function render(){
  const state = loadState();
  const defeatedIds = new Set(state.defeated || []);
  const currentIdx = state.chapterIdx || 0;

  document.getElementById('map-defeated').textContent = defeatedIds.size;
  document.getElementById('map-current').textContent = `Ch.${currentIdx+1}`;

  let html = '';
  let lastTheme = '';
  CHAPTERS.forEach((ch, i)=>{
    if(ch.theme !== lastTheme){
      html += `<div class="theme-divider">窶・${ch.theme} 窶・/div>`;
      lastTheme = ch.theme;
    }
    const isCleared = defeatedIds.has(ch.id);
    const isCurrent = i === currentIdx && !isCleared;
    const isLocked  = i > currentIdx && !isCleared;
    const cls = isCleared ? 'cleared' : isCurrent ? 'current' : isLocked ? 'locked' : '';
    const flip = i % 2 === 1 ? 'flip' : '';
    const dmg = getDmg(ch.id);
    const remain = isCleared ? 0 : Math.max(0, ch.hp - dmg);
    const pct = isCleared ? 100 : Math.round(Math.min(dmg, ch.hp) / ch.hp * 100);
    const status = isCleared ? '笨・險惹ｼ先ｸ医∩' : isCurrent ? '笞・謌ｦ髣倅ｸｭ' : isLocked ? '白 譛ｪ蛻ｰ驕・ : '';
    const href = isLocked ? '#' : './adventure.html';

    html += `
      <div class="chapter-row ${cls} ${flip}">
        <div class="chapter-spacer"></div>
        <div class="chapter-token"><img src="${ch.img}" alt=""></div>
        <a href="${href}" class="chapter-card">
          <div class="cc-stage">${ch.stage}</div>
          <div class="cc-name">${ch.name}</div>
          <div class="cc-hp">HP ${remain}/${ch.hp}</div>
          <div class="cc-hp-bar"><div class="cc-hp-fill" style="width:${pct}%"></div></div>
          <div class="cc-status">${status}</div>
        </a>
      </div>
    `;
  });
  list.innerHTML = html;
}

render();
</script>
