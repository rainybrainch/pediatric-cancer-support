<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次アンケート ｜ ヴィタリア転生録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--bg2:#0e1220;--gold:#c9a84c;--gold2:#f0d48a;--silver:#aabcd8;--green:#4ec98a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--silver);min-height:100vh;overflow-x:hidden;}

header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header a{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:900;color:var(--gold2);text-decoration:none;}
.skip-btn{background:none;border:1px solid rgba(170,188,216,.25);color:rgba(170,188,216,.7);font-size:.72rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;text-decoration:none;}

.page{max-width:560px;margin:0 auto;padding:18px 18px 80px;}
.intro{
  background:linear-gradient(135deg,rgba(156,114,224,.12),rgba(156,114,224,.04));
  border:1px solid rgba(156,114,224,.3);border-radius:14px;
  padding:18px 20px;margin-bottom:18px;text-align:center;
}
.week-badge{display:inline-block;background:rgba(156,114,224,.18);border:1px solid rgba(156,114,224,.5);color:#c0a0f0;font-size:.6rem;letter-spacing:.18em;font-weight:700;padding:3px 14px;border-radius:99px;margin-bottom:8px;}
.intro h1{font-family:'Noto Serif JP',serif;font-size:1.18rem;color:#e8d4ff;margin-bottom:6px;}
.intro p{font-size:.74rem;color:rgba(220,220,250,.75);line-height:1.75;}

.q-card{background:rgba(14,18,32,.85);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
.q-text{font-size:.85rem;color:#e8e4d4;font-weight:700;line-height:1.6;margin-bottom:10px;}
.q-sub{font-size:.65rem;color:rgba(170,188,216,.55);margin-bottom:8px;}

.scale-row{display:flex;gap:5px;}
.scale-row label{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(170,188,216,.15);
  border-radius:9px;padding:9px 4px;transition:all .15s;
  font-size:.7rem;color:rgba(220,225,245,.7);
}
.scale-row label:has(input:checked){background:rgba(156,114,224,.22);border-color:rgba(192,160,240,.6);color:#c0a0f0;}
.scale-row input{display:none;}
.scale-row .scale-num{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:900;}
.scale-row .scale-lbl{font-size:.55rem;}

.submit-bar{
  position:fixed;bottom:0;left:0;right:0;background:rgba(8,11,20,.95);
  backdrop-filter:blur(12px);border-top:1px solid rgba(201,168,76,.2);
  padding:12px 18px;text-align:center;z-index:100;
}
.btn-submit{background:linear-gradient(135deg,#c9a84c,#f0d48a);border:none;color:#1a1200;
  font-family:'Noto Serif JP',serif;font-size:.92rem;font-weight:900;padding:11px 32px;border-radius:10px;
  cursor:pointer;letter-spacing:.05em;width:100%;max-width:340px;}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
</style>
<style id="watercolor-skin">
body{background:#c8e4f4 !important;color:#0a2a40 !important;}
header{background:rgba(200,228,244,.97) !important;border-bottom:1px solid #b0cfdf !important;}
header a{color:#1e7fa4 !important;}
.card,.section,.intro-card{background:#ffffff !important;border-color:#b0cfdf !important;}
h1,h2,.section-title{color:#1e7fa4 !important;}
p,.section-desc,label{color:#0a2a40 !important;}
.opt-list label,label{background:#f0f8fc !important;border-color:#b0cfdf !important;color:#0a2a40 !important;}
.opt-list label:has(input:checked){background:rgba(74,176,212,.2) !important;border-color:#1e7fa4 !important;color:#0a4870 !important;}
.scale-row label{background:#f0f8fc !important;border-color:#b0cfdf !important;color:#0a2a40 !important;}
.scale-row label:has(input:checked){background:rgba(74,176,212,.25) !important;border-color:#1e7fa4 !important;color:#0a4870 !important;}
input,select,textarea{background:#f0f8fc !important;border-color:#b0cfdf !important;color:#0a2a40 !important;}
input:focus,select:focus,textarea:focus{border-color:#1e7fa4 !important;outline:none;}
.bottom-bar,.foot-nav{background:rgba(200,228,244,.97) !important;border-top:1px solid #b0cfdf !important;}
.btn-submit{background:linear-gradient(135deg,#1e7fa4,#4ab0d4) !important;color:#fff !important;}
</style>
<script src="./app-safety.js"></script>
</head>
<body>
<header>
  <a href="./game.html">⟵ ヴィタリア転生録</a>
  <a href="./game.html" class="skip-btn">あとで</a>
</header>

<main class="page">
  <div class="intro">
    <div class="week-badge" id="wk-badge">WEEK —</div>
    <h1>📋 週次アンケート</h1>
    <p>過去7日間の状態を5段階で評価してください。<br>所要時間：約1分（記録で +30XP）</p>
  </div>

  <div class="q-card">
    <div class="q-text">疲労感の強さ</div>
    <div class="q-sub">過去7日間で感じた疲れ</div>
    <div class="scale-row">
      <label><input type="radio" name="fatigue" value="1"><span class="scale-num">1</span><span class="scale-lbl">なし</span></label>
      <label><input type="radio" name="fatigue" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="fatigue" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="fatigue" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="fatigue" value="5"><span class="scale-num">5</span><span class="scale-lbl">非常</span></label>
    </div>
  </div>

  <div class="q-card">
    <div class="q-text">睡眠の質</div>
    <div class="q-sub">過去7日間の眠りの満足度</div>
    <div class="scale-row">
      <label><input type="radio" name="sleep" value="1"><span class="scale-num">1</span><span class="scale-lbl">悪い</span></label>
      <label><input type="radio" name="sleep" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="sleep" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="sleep" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="sleep" value="5"><span class="scale-num">5</span><span class="scale-lbl">良い</span></label>
    </div>
  </div>

  <div class="q-card">
    <div class="q-text">気分の落ち込み</div>
    <div class="q-sub">過去7日間で「沈んだ気分」を感じた強さ</div>
    <div class="scale-row">
      <label><input type="radio" name="depression" value="1"><span class="scale-num">1</span><span class="scale-lbl">なし</span></label>
      <label><input type="radio" name="depression" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="depression" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="depression" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="depression" value="5"><span class="scale-num">5</span><span class="scale-lbl">強い</span></label>
    </div>
  </div>

  <div class="q-card">
    <div class="q-text">不安の強さ</div>
    <div class="q-sub">過去7日間に感じた緊張・不安</div>
    <div class="scale-row">
      <label><input type="radio" name="anxiety" value="1"><span class="scale-num">1</span><span class="scale-lbl">なし</span></label>
      <label><input type="radio" name="anxiety" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="anxiety" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="anxiety" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="anxiety" value="5"><span class="scale-num">5</span><span class="scale-lbl">強い</span></label>
    </div>
  </div>

  <div class="q-card">
    <div class="q-text">健康習慣を続けられている自信</div>
    <div class="q-sub">この1週間、運動・食事の目標にどれくらい近づけた？</div>
    <div class="scale-row">
      <label><input type="radio" name="self-eff" value="1"><span class="scale-num">1</span><span class="scale-lbl">遠い</span></label>
      <label><input type="radio" name="self-eff" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="self-eff" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="self-eff" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="self-eff" value="5"><span class="scale-num">5</span><span class="scale-lbl">達成</span></label>
    </div>
  </div>

  <div class="q-card">
    <div class="q-text">体調の総合評価</div>
    <div class="q-sub">過去7日間、全体としてどう感じた？</div>
    <div class="scale-row">
      <label><input type="radio" name="global" value="1"><span class="scale-num">1</span><span class="scale-lbl">悪い</span></label>
      <label><input type="radio" name="global" value="2"><span class="scale-num">2</span></label>
      <label><input type="radio" name="global" value="3"><span class="scale-num">3</span></label>
      <label><input type="radio" name="global" value="4"><span class="scale-num">4</span></label>
      <label><input type="radio" name="global" value="5"><span class="scale-num">5</span><span class="scale-lbl">良い</span></label>
    </div>
  </div>
</main>

<div class="submit-bar">
  <button class="btn-submit" id="submit" disabled>送信する ✦</button>
</div>

<script>
const fields = ['fatigue','sleep','depression','anxiety','self-eff','global'];
const submitBtn = document.getElementById('submit');

function check(){
  const ok = fields.every(f => document.querySelector(`input[name="${f}"]:checked`));
  submitBtn.disabled = !ok;
}
fields.forEach(f=>{
  document.querySelectorAll(`input[name="${f}"]`).forEach(r=>r.addEventListener('change', check));
});

// 週番号計算（参加開始日から）
const uid = localStorage.getItem('vitalia_uid_hint') || '';
const startDate = localStorage.getItem(`vt_start_date_${uid}`) || new Date().toISOString().slice(0,10);
const start = new Date(startDate);
const daysSinceStart = Math.floor((new Date() - start) / 86400000);
const weekNum = Math.floor(daysSinceStart / 7) + 1;
document.getElementById('wk-badge').textContent = `WEEK ${weekNum}`;

submitBtn.addEventListener('click', async ()=>{
  const data = {};
  fields.forEach(f=>{
    const v = document.querySelector(`input[name="${f}"]:checked`)?.value;
    data[f] = v ? parseInt(v,10) : null;
  });
  data.weekNum = weekNum;
  data.completedAt = new Date().toISOString();
  data.uid = uid;
  data.instrumentVersion = '2026-05-weekly-promis-v1';

  try{
    const k = `vt_weekly_survey_${uid}`;
    const arr = JSON.parse(localStorage.getItem(k)||'[]');
    arr.unshift(data);
    localStorage.setItem(k, JSON.stringify(arr.slice(0,52)));

    // 今週は記録済みフラグ
    localStorage.setItem(`vt_weekly_survey_done_${uid}_${weekNum}`, '1');

    // XP +30
    const wk = weekKey();
    const xpKey = `vc_xp_${uid}_${wk}`;
    const cur = parseInt(localStorage.getItem(xpKey)||'0',10);
    localStorage.setItem(xpKey, String(cur+30));
  }catch(e){}

  // Firestore
  try{
    if(window.AppSafety) window.AppSafety.queueRecord('weekly_surveys', data);
  }catch(e){}

  alert('✓ 週次アンケート完了！+30XP獲得しました。');
  location.href = './game.html';
});

function weekKey(){
  const d=new Date(),j=new Date(d.getFullYear(),0,1);
  const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
  return `${d.getFullYear()}_W${String(w).padStart(2,'0')}`;
}
</script>
</body>
</html>
