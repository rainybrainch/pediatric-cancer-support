<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません — ヴィタリア転生録</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #0f1e35 50%, #0a1428 100%);
      color: #e8f4ec;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .error-container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
      animation: fadeIn 0.8s ease-out;
    }

    .error-code {
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #5fd8f8, #29b6e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      font-family: 'Noto Serif JP', serif;
    }

    .error-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 12px;
      font-family: 'Noto Serif JP', serif;
    }

    .error-message {
      font-size: 1rem;
      color: rgba(232, 244, 236, 0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4ec98a, #2ba3d8);
      color: #0c1a2e;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(78, 201, 138, 0.3);
    }

    .btn-secondary {
      background: rgba(95, 208, 232, 0.2);
      color: #5fd8f8;
      border: 1.5px solid rgba(95, 208, 232, 0.5);
    }

    .btn-secondary:hover {
      background: rgba(95, 208, 232, 0.3);
      border-color: #5fd8f8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="icon">🗺️</div>
    <div class="error-code">404</div>
    <h1 class="error-title">ページが見つかりません</h1>
    <p class="error-message">
      申し訳ありません。お探しのページは見つかりませんでした。<br>
      URLが正しいか確認するか、ホームから再度探してください。
    </p>
    <div class="error-actions">
      <a href="./game.html" class="btn btn-primary">🏠 ホームへ戻る</a>
      <a href="javascript:history.back()" class="btn btn-secondary">← 前のページへ</a>
    </div>
  </div>
</body>
</html>
