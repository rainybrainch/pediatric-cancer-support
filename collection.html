<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コレクション ｜ ヴィタリア転生録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--gold:#c9a84c;--gold2:#f0d48a;--silver:#aabcd8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:radial-gradient(ellipse at 50% 0%,#1a1430 0%,#080b14 60%);color:var(--silver);min-height:100vh;overflow-x:hidden;}
header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
header a{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:900;color:var(--gold2);text-decoration:none;}
.back-btn{background:none;border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.7);font-size:.72rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;text-decoration:none;}

.page{max-width:760px;margin:0 auto;padding:20px 18px 60px;}
.intro{text-align:center;margin-bottom:24px;}
.intro h1{font-family:'Noto Serif JP',serif;font-size:1.5rem;color:var(--gold2);margin-bottom:6px;}
.intro p{font-size:.78rem;color:rgba(220,225,245,.7);}
.progress{margin-top:14px;background:rgba(0,0,0,.3);border-radius:99px;overflow:hidden;height:10px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#f0d48a);border-radius:99px;transition:width .5s;}
.progress-meta{font-size:.62rem;color:rgba(240,212,138,.7);margin-top:5px;text-align:center;}

.rarity-tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:18px;}
.rarity-tab{background:rgba(255,255,255,.04);border:1px solid rgba(170,188,216,.2);color:rgba(220,225,245,.7);font-family:inherit;font-size:.72rem;font-weight:700;padding:6px 14px;border-radius:99px;cursor:pointer;}
.rarity-tab.active{background:rgba(201,168,76,.18);border-color:var(--gold2);color:var(--gold2);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.card{
  position:relative;background:linear-gradient(160deg,rgba(20,16,40,.85),rgba(8,6,20,.95));
  border:2px solid var(--c-color,rgba(170,188,216,.2));border-radius:14px;
  padding:14px 10px 10px;text-align:center;
  transition:all .25s;
}
.card.have{cursor:default;}
.card.locked{opacity:.4;filter:grayscale(.7);}
.card.have:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--c-color,#fff)33;}
.card-rarity{font-size:.5rem;letter-spacing:.18em;font-weight:900;color:var(--c-color);margin-bottom:6px;text-transform:uppercase;}
.card-icon{font-size:2.5rem;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 12px var(--c-color));}
.card-name{font-family:'Noto Serif JP',serif;font-size:.82rem;font-weight:900;color:var(--c-color);margin-bottom:5px;line-height:1.3;}
.card-desc{font-size:.6rem;color:rgba(220,225,245,.7);line-height:1.5;min-height:24px;}
.card-count{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:var(--c-color);font-size:.6rem;font-weight:900;padding:2px 7px;border-radius:99px;}
.card-locked-icon{font-size:1.5rem;color:rgba(170,188,216,.5);}
.card-actions{display:flex;gap:4px;margin-top:8px;justify-content:center;}
.ca-btn{font-family:inherit;font-size:.55rem;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;border:1px solid;}
.ca-btn.equip{background:rgba(78,201,138,.12);border-color:rgba(78,201,138,.4);color:#a8e8c0;}
.ca-btn.equip.equipped{background:rgba(78,201,138,.35);border-color:#a8e8c0;}
.ca-btn.use{background:rgba(240,180,80,.12);border-color:rgba(240,180,80,.4);color:#f0c060;}
.ca-btn:disabled{opacity:.4;cursor:not-allowed;}

.equip-bar{
  background:linear-gradient(135deg,rgba(78,201,138,.08),rgba(78,201,138,.02));
  border:1px solid rgba(78,201,138,.3);border-radius:12px;
  padding:11px 14px;margin-bottom:18px;
}
.equip-head{font-size:.62rem;letter-spacing:.12em;color:rgba(168,232,192,.78);font-weight:700;text-transform:uppercase;margin-bottom:8px;}
.equip-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.equip-slot{aspect-ratio:1;background:rgba(0,0,0,.3);border:1.5px dashed rgba(168,232,192,.25);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.6rem;color:rgba(170,188,216,.4);}
.equip-slot.filled{border-style:solid;border-color:var(--c-color);background:linear-gradient(160deg,rgba(20,16,40,.85),rgba(8,6,20,.95));color:var(--c-color);}
.equip-slot-icon{font-size:1.6rem;line-height:1;}
.equip-slot-name{font-family:'Noto Serif JP',serif;font-size:.62rem;margin-top:3px;font-weight:700;}

.event-banner{
  background:linear-gradient(135deg,rgba(240,180,80,.18),rgba(240,180,80,.06));
  border:1.5px solid rgba(240,180,80,.5);border-radius:12px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.eb-icon{font-size:1.5rem;line-height:1;}
.eb-info{flex:1;}
.eb-name{font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:900;color:#f0d048;}
.eb-desc{font-size:.66rem;color:rgba(220,225,245,.85);margin-top:2px;}
@media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}.card{padding:11px 8px 8px;}.card-icon{font-size:2rem;}.card-name{font-size:.74rem;}}
</style>
<script src="./app-safety.js"></script>
<script src="./gamification.js"></script>
<style id="watercolor-skin">
/* ============================================
   水色スキン v1 ── 2026-05-11
   創造主指示「ゲームのデザインを水色に。文字見やすく」
   既存の dark-fantasy CSS を上書きする最後尾レイヤー
   ============================================ */
:root{
  --bg:    #e8f4fb;
  --bg2:   #d6ebf6;
  --bg3:   #c2dff0;
  --gold:  #1e7fa4;
  --gold2: #4ab0d4;
  --silver:#3a6f8a;
  --text:  #0f2a3a;
  --muted: #5a7a90;
  --green: #1f8a66;
  --purple:#5b4ea8;
  --red:   #b53a3a;
  --orange:#c46a1e;
  --rose:  #c26092;
}
html, body{ background: var(--bg) !important; color: var(--text) !important; }
body::before{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,255,255,.7), transparent 55%),
    radial-gradient(ellipse at 80% 25%, rgba(255,255,255,.5), transparent 60%),
    radial-gradient(ellipse at 50% 70%, rgba(255,255,255,.55), transparent 60%) !important;
  opacity: .85 !important;
}
#loading-screen, #login-screen{ background: var(--bg) !important; }
#loading-screen::before{ opacity:.6 !important; }
.gold-text, .ls-title, [class*="title-gold"]{
  background: linear-gradient(135deg, #1e7fa4, #2a96bf, #4ab0d4) !important;
  -webkit-background-clip: text !important; background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  color: transparent !important;
}
.ls-bar-fill{ background: linear-gradient(90deg, #2a96bf, #4ab0d4, #2a96bf) !important; }
.ls-sub, .ls-msg{ color: rgba(20,60,80,.55) !important; }
.ls-char{
  border-color: rgba(30,127,164,.4) !important;
  box-shadow: 0 0 50px rgba(30,127,164,.18), 0 0 100px rgba(74,176,212,.12) !important;
}
/* インライン style の暗背景前提白オーバーレイ → 暗側半透明に反転 */
[style*="rgba(255,255,255,.04)"],
[style*="rgba(255,255,255,.06)"],
[style*="rgba(255,255,255,.07)"],
[style*="rgba(255,255,255,.08)"],
[style*="rgba(255,255,255,.1)"]{
  background: rgba(20,80,110,.07) !important;
  border-color: rgba(30,127,164,.28) !important;
  color: var(--text) !important;
}
input[type="text"], input[type="email"], input[type="number"], input[type="date"],
input[type="password"], input[type="tel"], input[type="search"], select, textarea{
  background: rgba(255,255,255,.85) !important;
  border-color: rgba(30,127,164,.35) !important;
  color: var(--text) !important;
}
::placeholder{ color: rgba(20,60,80,.45) !important; }
a{ color: #1e7fa4; }
a:hover{ color: #4ab0d4; }
/* 見出しの可読性：透明文字フォールバック（gradient 失敗時に黒く出る対策） */
@supports not (background-clip: text){
  .gold-text, .ls-title{ color: #1e7fa4 !important; -webkit-text-fill-color: #1e7fa4 !important; }
}
</style>
</head>
<body>
<header>
  <a href="./game.html">⟵ ヴィタリア転生録</a>
  <a href="./game.html" class="back-btn">ホーム</a>
</header>

<main class="page">
  <div class="intro">
    <h1>🎴 アイテムコレクション</h1>
    <p>記録・冒険で手に入れたアイテム達。レアなものを集めよう。</p>
    <div class="progress"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-meta" id="prog-meta">—</div>
  </div>

  <!-- イベント表示 -->
  <div id="event-display"></div>

  <!-- 装備スロット -->
  <div class="equip-bar">
    <div class="equip-head">⚙ 装備中（永続的にバフ・最大3つ）</div>
    <div class="equip-slots" id="equip-slots"></div>
  </div>

  <div class="rarity-tabs">
    <button class="rarity-tab active" data-rarity="all">すべて</button>
    <button class="rarity-tab" data-rarity="common">コモン</button>
    <button class="rarity-tab" data-rarity="uncommon">アンコモン</button>
    <button class="rarity-tab" data-rarity="rare">レア</button>
    <button class="rarity-tab" data-rarity="epic">エピック</button>
    <button class="rarity-tab" data-rarity="legendary">レジェンダリー</button>
  </div>

  <div class="grid" id="card-grid"></div>
</main>

<script>
let _filter = 'all';
function render(){
  if(!window.Gamification){
    setTimeout(render, 200);
    return;
  }
  const inv = window.Gamification.getInventory();
  const items = window.Gamification.ITEMS;
  const colors = window.Gamification.RARITY_COLORS;
  const equipped = window.Gamification.getEquipped();
  const grid = document.getElementById('card-grid');
  const filtered = _filter === 'all' ? items : items.filter(i=>i.rarity===_filter);
  grid.innerHTML = filtered.map(i=>{
    const have = (inv[i.id]||0) > 0;
    const count = inv[i.id]||0;
    const color = colors[i.rarity] || '#aabcd8';
    const isEquipped = equipped.includes(i.id);
    const actions = have ? `
      <div class="card-actions">
        <button class="ca-btn equip ${isEquipped?'equipped':''}" data-action="${isEquipped?'unequip':'equip'}" data-id="${i.id}">${isEquipped?'解除':'装備'}</button>
        <button class="ca-btn use" data-action="use" data-id="${i.id}" ${isEquipped?'disabled':''}>使う</button>
      </div>
    ` : '';
    return `
      <div class="card ${have?'have':'locked'}" style="--c-color:${color};">
        ${have ? `<div class="card-count">×${count}</div>` : ''}
        <div class="card-rarity">${i.rarity}</div>
        <div class="card-icon">${have ? i.icon : '🔒'}</div>
        <div class="card-name">${have ? i.name : '???'}</div>
        <div class="card-desc">${have ? i.desc : '未獲得'}</div>
        ${actions}
      </div>
    `;
  }).join('');
  // 進捗
  const cp = window.Gamification.getCollectionProgress();
  document.getElementById('prog-fill').style.width = cp.percent+'%';
  document.getElementById('prog-meta').textContent = `${cp.haveUnique} / ${cp.totalUnique} 種類獲得（${cp.percent}%）`;
  renderEquipSlots();
  renderEvent();
  // ボタンバインド
  document.querySelectorAll('.ca-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const id = b.dataset.id, action = b.dataset.action;
      if(action === 'equip'){
        if(window.Gamification.equipItem(id)){
          render();
        } else {
          alert('装備失敗（スロット満杯 or 未所持）');
        }
      } else if(action === 'unequip'){
        window.Gamification.unequipItem(id);
        render();
      } else if(action === 'use'){
        if(!confirm('このアイテムを使用しますか？（消費されます）')) return;
        const r = window.Gamification.useItem(id);
        if(r.ok){
          alert('✓ ' + r.msg);
          try{ if(window.AppEnhance?.confetti) window.AppEnhance.confetti({count:30}); }catch(e){}
          render();
        } else {
          alert(r.msg);
        }
      }
    });
  });
}
function renderEquipSlots(){
  if(!window.Gamification) return;
  const eq = window.Gamification.getEquipped();
  const items = window.Gamification.ITEMS;
  const colors = window.Gamification.RARITY_COLORS;
  const slots = document.getElementById('equip-slots');
  let html = '';
  for(let i=0;i<3;i++){
    const id = eq[i];
    if(id){
      const item = items.find(x=>x.id===id);
      const color = item ? (colors[item.rarity]||'#aabcd8') : '#aabcd8';
      html += `<div class="equip-slot filled" style="--c-color:${color};"><div class="equip-slot-icon">${item?.icon||'?'}</div><div class="equip-slot-name">${item?.name||'?'}</div></div>`;
    } else {
      html += `<div class="equip-slot">+</div>`;
    }
  }
  slots.innerHTML = html;
}
function renderEvent(){
  if(!window.Gamification) return;
  const ev = window.Gamification.getActiveEvent();
  const el = document.getElementById('event-display');
  if(!ev){ el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="event-banner">
      <div class="eb-icon">${ev.icon}</div>
      <div class="eb-info">
        <div class="eb-name">${ev.name}</div>
        <div class="eb-desc">${ev.desc}</div>
      </div>
    </div>
  `;
}
document.querySelectorAll('.rarity-tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('.rarity-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    _filter = t.dataset.rarity;
    render();
  });
});
render();
</script>
</body>
</html>
