<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1f3a"></stop>
      <stop offset="60%" stop-color="#0d1225"></stop>
      <stop offset="100%" stop-color="#080b14"></stop>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d48a"></stop>
      <stop offset="50%" stop-color="#c9a84c"></stop>
      <stop offset="100%" stop-color="#8a6510"></stop>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0a0f0"></stop>
      <stop offset="100%" stop-color="#9c72e0"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"></rect>

  
  <circle cx="80" cy="100" r="2.5" fill="#fff" opacity="0.6"></circle>
  <circle cx="430" cy="80" r="2" fill="#fff" opacity="0.5"></circle>
  <circle cx="120" cy="180" r="1.8" fill="#fff" opacity="0.5"></circle>
  <circle cx="380" cy="160" r="2" fill="#fff" opacity="0.6"></circle>
  <circle cx="60" cy="380" r="2" fill="#fff" opacity="0.4"></circle>
  <circle cx="450" cy="430" r="2.2" fill="#fff" opacity="0.5"></circle>

  
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#purple)" stroke-width="3" opacity="0.4"></circle>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.55"></circle>

  
  <g filter="url(#glow)" transform="translate(256 256)">
    <path d="M 0 -130 L 18 -18 L 130 0 L 18 18 L 0 130 L -18 18 L -130 0 L -18 -18 Z" fill="url(#gold)"></path>
    <path d="M 0 -65 L 9 -9 L 65 0 L 9 9 L 0 65 L -9 9 L -65 0 L -9 -9 Z" fill="#fff7d8" opacity="0.85"></path>
  </g>

  
  <text x="256" y="455" text-anchor="middle" font-family="Noto Serif JP, serif" font-weight="900" font-size="48" fill="url(#gold)" letter-spacing="6">VITALIA</text>
</svg>