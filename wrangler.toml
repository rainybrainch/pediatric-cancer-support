# Cloudflare Workers + Static Assets 設定
name = "aya-health-quest"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静的アセット配信
[assets]
directory = "./"
binding = "ASSETS"
# /api/* は静的アセットより先に Worker が処理する（重要！）
run_worker_first = ["/api/*"]
# .html を勝手に除去するリダイレクトを無効化（モバイルでERR_FAILEDになる原因）
html_handling = "none"
not_found_handling = "404-page"
